x-build-args: &build-args
  BUILDKIT_INLINE_CACHE: 1

networks:
  rattel_network:
    driver: bridge

services:
  db:
    image: postgres:18.1-alpine
    container_name: rattel_db
    environment:
      POSTGRES_DB: rattel_db
      POSTGRES_USER: rattel_user
      POSTGRES_PASSWORD: rattel_password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rattel_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rattel_user -d rattel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1s
      start_interval: 1s
    shm_size: 256mb
    restart: unless-stopped

  redis:
    image: redis:8.4-alpine
    container_name: rattel_redis
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rattel_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 1s
      start_interval: 1s
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./RattelBackend/
      dockerfile: Dockerfile
      cache_from:
        - rattel_backend:latest
      args:
        <<: *build-args
    image: rattel_backend:latest
    container_name: rattel_backend
    command: ["/app/entrypoint.sh"]
    volumes:
      - ./RattelBackend/:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    networks:
      - rattel_network
    environment:
      RUN_TESTS: "1"
    env_file:
      - ./RattelBackend/.env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/?format=json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1s
      start_interval: 1s
    restart: unless-stopped

  frontend:
    build:
      context: ./rattel-frontend
      dockerfile: Dockerfile
      cache_from:
        - rattel_frontend:latest
      args:
        <<: *build-args
    image: rattel_frontend:latest
    container_name: rattel_frontend
    volumes:
      - ./rattel-frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - rattel_network
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    depends_on:
      backend:
        condition: service_healthy
    command: ["npm", "run", "dev"]
    restart: unless-stopped

  celery:
    image: rattel_backend:latest
    container_name: rattel_celery
    command: celery -A RattelBackend worker -l info --concurrency=6 --max-tasks-per-child=1000
    volumes:
      - ./RattelBackend:/app
    networks:
      - rattel_network
    env_file:
      - ./RattelBackend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  celery-beat:
    image: rattel_backend:latest
    container_name: rattel_celery_beat
    command: celery -A RattelBackend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./RattelBackend:/app
    networks:
      - rattel_network
    env_file:
      - ./RattelBackend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      celery:
        condition: service_started
    restart: unless-stopped

  flower:
    image: rattel_backend:latest
    container_name: rattel_flower
    command: celery -A RattelBackend flower --port=5555 --max_tasks=10000
    ports:
      - "5555:5555"
    networks:
      - rattel_network
    env_file:
      - ./RattelBackend/.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
